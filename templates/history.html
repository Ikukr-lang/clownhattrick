{% extends "base.html" %}
{% block content %}
<h2>История матчей</h2>
{% for m in matches %}
<div class="card mb-3 bg-dark">
    <div class="card-body">
        <strong>{{ m.date }} — {{ m.opponent }}</strong><br>
        Счёт: <span class="text-warning">{{ m.score }}</span><br>
        <small>{{ m.report|safe }}</small>
    </div>
</div>
{% endfor %}
{% endblock %}
